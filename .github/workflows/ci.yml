name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install only what tests need so we avoid pulling frida/objection
          # (those depend on platform-specific libs the CI runner doesn't have).
          pip install \
            "pydantic>=2.6,<3" \
            "structlog>=24.1,<26" \
            "httpx>=0.27,<1" \
            "anyio>=4.3,<5" \
            "click>=8.1,<9" \
            "PyYAML>=6.0,<7" \
            "Jinja2>=3.1,<4" \
            "aiofiles>=23.2,<25" \
            "python-ulid>=2.2,<4" \
            "PyJWT>=2.8,<3" \
            "mcp>=1.2,<2" \
            "jsonschema>=4.20,<5" \
            "pytest>=8.0,<9" \
            "pytest-asyncio>=0.23,<1" \
            "ruff>=0.4,<1"

      - name: Ruff lint (non-vendor code)
        run: ruff check agent api frida_layer objection_layer mitm/__init__.py mitm/client.py mitm/replay tests

      - name: Run pytest
        run: pytest tests -v --tb=short
